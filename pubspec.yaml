name: salon_manager
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Pehle se maujood stable versions
  intl: ^0.19.0
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  image_picker: ^1.2.1

  # State Management
  provider: ^6.1.5+1

  # Image caching
  cached_network_image: ^3.4.1

  # WhatsApp share
  share_plus: ^12.0.2

  # ✅ Printing ke liye UPDATED packages
  pdf: ^3.12.0
  printing: ^5.14.3
  unified_esc_pos_printer: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Icon configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpg.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.jpg.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.jpg.jpeg
    - assets/logo.png
    - assets/exp.png
    - assets/emp.png
    - assets/headlogo.jpeg