name: salon_manager
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Pehle se maujood stable versions
  intl: ^0.19.0
  firebase_core: ^4.3.0  # Latest version check kar lein
  firebase_auth: ^6.1.3  # Latest version check kar lein
  cloud_firestore: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Icon generate karne ke liye naya package
  flutter_launcher_icons: ^0.14.4

# Icon ki configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpg.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.jpg.jpeg"

flutter:
  uses-material-design: true

  # Assets folder ko register karna taake app icon image ko parh sake
  assets:
    - assets/icon.jpg.jpeg